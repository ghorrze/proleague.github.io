<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Pro League II</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="hero">
        <div class="hero-slideshow" id="heroSlideshow"></div>
        
        <div class="hero-content">
            <h1>Counter-Strike 2</h1>
            <p>Актуальные составы команд киберспортивной лиги Pro League II</p>
            <a href="#teams-section" class="scroll-btn">Посмотреть команды</a>
        </div>
    </header>

    <main class="main-content" id="teams-section">
        <h2 class="section-title">Команды</h2>
        <div class="teams-grid" id="teamsGrid">
            </div>
    </main>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <button class="close-btn" id="closeBtn">&times;</button>
            <div class="modal-header">
                <img src="" alt="" class="modal-logo" id="modalLogo">
                <div class="modal-title-container">
                    <h2 id="modalTeamName">Имя команды</h2>
                </div>
            </div>
            <div class="modal-body">
                <h3>Описание команды</h3>
                <p class="modal-description" id="modalDescription">Описание...</p>
                
                <h3>Состав</h3>
                <ul class="roster-list" id="modalRoster">
                    </ul>
            </div>
        </div>
    </div>

    <script src="scripts/data.js"></script>
    <script src="scripts/slideshow.js"></script>
    <script src="scripts/main.js"></script>
    <script src="scripts/scroll.js"></script>
</body>
</html>
